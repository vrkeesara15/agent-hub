# Knowledge Base Configuration
# Controls which data files are loaded and in what priority order.
# Higher priority files are checked first when looking up table information.
# Files can be added/removed and the system will adapt dynamically.

version: "1.0"

# Data directory (relative to backend root)
data_directory: "data/sample"

# Refresh interval in seconds (3600 = 1 hour, 86400 = 24 hours)
# Set to 0 to disable auto-refresh
refresh_interval_seconds: 86400

# Data sources in priority order (highest priority first)
# Each source has:
#   - name: unique identifier for this dataset
#   - file: CSV filename in the data directory
#   - type: mapping | metadata | status | inventory
#   - priority: numeric priority (higher = checked first)
#   - key_fields: fields used to match tables (searched in order)
#   - description: human-readable description
sources:
  - name: teradata_gcp_mapping
    file: teradata_gcp_mapping.csv
    type: mapping
    priority: 100
    key_fields:
      - legacy_table
      - gcp_table
      - gcp_full_path
    description: "Primary Teradata to GCP table mapping with modernization status"

  - name: gcp_metadata
    file: gcp_metadata.csv
    type: metadata
    priority: 90
    key_fields:
      - gcp_table
      - gcp_full_path
    description: "GCP BigQuery table metadata (row counts, sizes, partitioning, dates)"

  - name: table_status
    file: table_status.csv
    type: status
    priority: 80
    key_fields:
      - table_name
      - gcp_full_path
    description: "Table health status, SLA tiers, deprecation info"

  - name: dag_inventory
    file: dag_inventory.csv
    type: inventory
    priority: 70
    key_fields:
      - target_table
    description: "Airflow DAG inventory linking pipelines to tables"

  # Legacy files (kept for backward compatibility, lower priority)
  - name: uc1_object_sheet
    file: uc1_object_sheet.csv
    type: mapping
    priority: 50
    key_fields:
      - legacy_table
      - gcp_table
    description: "Legacy UC1 object sheet (superseded by teradata_gcp_mapping)"

  - name: table_mapping
    file: table_mapping.csv
    type: status
    priority: 40
    key_fields:
      - table_name
    description: "Legacy table health mapping (superseded by table_status)"
