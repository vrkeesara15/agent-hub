# Knowledge Base Configuration
# Controls which data files are loaded and in what priority order.
# Higher priority files are checked first when looking up table information.
# Files can be added/removed and the system will adapt dynamically.

version: "2.0"

# Data directory (relative to backend root)
data_directory: "data/sample"

# Refresh interval in seconds (3600 = 1 hour, 86400 = 24 hours)
# Set to 0 to disable auto-refresh
refresh_interval_seconds: 86400

# Data sources in priority order (highest priority first)
# Each source has:
#   - name: unique identifier for this dataset
#   - file: CSV filename in the data directory
#   - type: mapping | metadata | status | inventory
#   - priority: numeric priority (higher = checked first)
#   - key_fields: fields used to match tables (searched in order)
#   - description: human-readable description
sources:
  # PRIMARY: UG1 Objects — Teradata-to-GCP migration status for UG1 objects
  # 304 objects with workstream, source/target mapping, status, notes
  - name: ug1_objects
    file: ug1_objects.csv
    type: mapping
    priority: 100
    key_fields:
      - TD_Object_Name
      - GCP_Object_Name
      - TD_Object_Reference
      - TD_DB_Name
    description: "UG1 object migration mapping: Teradata source to GCP target with status (Available, Deprecated, Restricted, In Development)"

  # SECONDARY: Actuals — Replication tracking with modernization details
  # 1977 rows with GCP replicated tables, BQ views, DAGs, flip dates
  - name: actuals
    file: actuals.csv
    type: metadata
    priority: 90
    key_fields:
      - TD_Object_Name
      - GCP_Replicated_Table
      - Target_View_Name
      - BQ_View
      - Modernized_Table
    description: "Replication actuals: Teradata-to-GCP tracking with flip dates, DAG schedules, modernized table references"

  # TERTIARY: Frank Sheet — Comprehensive metadata with ownership info
  # 5259 rows with owner, POC, priority, replication decisions, usage stats
  - name: frank_sheet
    file: frank_sheet.csv
    type: inventory
    priority: 80
    key_fields:
      - tablename
      - TableList
      - GCP_Reference
    description: "Master inventory sheet with ownership (POC, org), replication decisions, load types, usage stats (read/write counts, row counts)"
